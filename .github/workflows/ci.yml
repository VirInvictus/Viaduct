name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  check:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    # viaduct requires gtk4 >= 4.16 (v4_16); Ubuntu runners ship 4.14.5, so
    # the build aborts in gdk4-sys before a single crate of ours compiles.
    # That is why this workflow had never once gone green on ubuntu-24.04.
    # Fedora carries a new-enough GTK, and the same container pattern is
    # already proven in Atrium and Colophon. rusqlite is bundled, so it
    # compiles from source and needs only a C toolchain.
    container: fedora:latest
    steps:
      - name: Install system dependencies
        run: |
          dnf install -y \
            gcc \
            git \
            pkgconf-pkg-config \
            glib2-devel \
            gtk4-devel \
            webkitgtk6.0-devel \
            sqlite-devel \
            xorg-x11-server-Xvfb

      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        # No current test calls gtk::init(), but the binary crate links gtk4
        # and webkit6 and a widget test could land later; running under xvfb
        # keeps a display available so the suite never depends on a headful
        # runner. Matches the Colophon/Atrium convention.
        env:
          GDK_BACKEND: x11
        run: xvfb-run -a cargo test --workspace
