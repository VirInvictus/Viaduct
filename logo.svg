<?xml version="1.0" encoding="UTF-8"?>
<!--
  Viaduct horizontal logo — unified cream card so the wordmark reads
  on light AND dark host backgrounds (GitHub light, GitHub dark, social
  card previews, dark file viewers, etc.).

  Layout: 480×144 viewBox. Cream rounded-card background covers the
  full canvas with a subtle vertical gradient. App icon sits at the
  left in its own slightly-darker rounded-square frame (so it reads as
  the icon, not as part of the wordmark plate). "viaduct" wordmark to
  its right in stone-slate, with the tagline underneath.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     width="480" height="144"
     viewBox="0 0 480 144"
     fill="none">
  <defs>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#F5EEE0"/>
      <stop offset="100%" stop-color="#EEE0CB"/>
    </linearGradient>
    <linearGradient id="iconBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#F5EEE0"/>
      <stop offset="100%" stop-color="#E2D2B7"/>
    </linearGradient>
    <linearGradient id="stone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#7A6A55"/>
      <stop offset="100%" stop-color="#5A4D3D"/>
    </linearGradient>
    <linearGradient id="rss" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#F08A2C"/>
      <stop offset="100%" stop-color="#D86F1A"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.4"/>
      <feOffset dx="0" dy="1.2" result="b"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.32"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!--
    Full-canvas cream card. Rounded corners so the banner reads as a
    complete unit rather than a transparent strip. This is what lets
    the dark wordmark below remain readable on dark host backgrounds.
  -->
  <rect x="0" y="0" width="480" height="144" rx="20" ry="20"
        fill="url(#card)"/>

  <!--
    Icon block at the left. Self-contained square (matches the app
    icon's geometry exactly, just shifted into the banner). 112px square
    with 16px outer margin from the card edge.
  -->
  <g transform="translate(16 16)">
    <rect x="0" y="0" width="112" height="112" rx="20" ry="20"
          fill="url(#iconBg)"/>
    <!--
      Arch — copy of the app icon paths, scaled from the 128 grid down
      to fit comfortably inside the 112 icon frame (factor ~0.78, plus
      a small downward bias to centre it visually with the keystone).
    -->
    <g transform="translate(7 7) scale(0.78)" filter="url(#shadow)">
      <path fill="url(#stone)" fill-rule="evenodd"
            d="
              M 24 110
              L 24 64
              A 40 40 0 0 1 104 64
              L 104 110
              Z
              M 34 110
              L 34 64
              A 30 30 0 0 1 94 64
              L 94 110
              Z
            "/>
      <path d="M 58 24 L 70 24 L 67.5 34 L 60.5 34 Z"
            fill="#9A8870" stroke="#3E332A" stroke-width="0.6"/>
    </g>
    <g transform="translate(50.7 75.6)" stroke="url(#rss)" stroke-linecap="round"
       fill="none">
      <circle cx="0" cy="0" r="3.5" fill="url(#rss)" stroke="none"/>
      <path d="M 0 -7.8 A 7.8 7.8 0 0 1 7.8 0" stroke-width="3.9"/>
      <path d="M 0 -15.6 A 15.6 15.6 0 0 1 15.6 0" stroke-width="3.9"/>
    </g>
  </g>

  <!--
    Wordmark + tagline. Stone-slate fill so it harmonises with the
    icon's masonry colour. Reads cleanly on the cream card regardless
    of the host page background.
  -->
  <text x="148" y="92"
        font-family="'Atkinson Hyperlegible Next', 'Atkinson Hyperlegible',
                     'Inter', system-ui, -apple-system, sans-serif"
        font-size="60"
        font-weight="700"
        fill="#3E332A"
        letter-spacing="-1.5">viaduct</text>

  <text x="151" y="116"
        font-family="'Atkinson Hyperlegible Next', 'Atkinson Hyperlegible',
                     'Inter', system-ui, -apple-system, sans-serif"
        font-size="14"
        font-weight="500"
        font-style="italic"
        fill="#7A6A55"
        letter-spacing="0.4">a Linux port of NetNewsWire</text>
</svg>
