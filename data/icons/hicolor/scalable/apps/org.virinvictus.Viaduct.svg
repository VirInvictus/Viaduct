<?xml version="1.0" encoding="UTF-8"?>
<!--
  Viaduct app icon — clean redraw.

  Design: a single masonry archway with concentric outer/inner arcs
  (so wall thickness is uniform 10px around the curve, not bloated at
  the apex), a small wedge-shaped keystone integrated at the apex, and
  the RSS broadcast mark prominently centred inside the open archway.

  Drawn on a 128×128 base canvas with a 12px GNOME safe margin.
  The arch is sized to read at 16×16 (where the keystone collapses
  but the silhouette + RSS dot remain legible).
-->
<svg xmlns="http://www.w3.org/2000/svg"
     width="128" height="128"
     viewBox="0 0 128 128"
     fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#F5EEE0"/>
      <stop offset="100%" stop-color="#E8DCC8"/>
    </linearGradient>
    <linearGradient id="stone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#7A6A55"/>
      <stop offset="100%" stop-color="#5A4D3D"/>
    </linearGradient>
    <linearGradient id="rss" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#F08A2C"/>
      <stop offset="100%" stop-color="#D86F1A"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.6"/>
      <feOffset dx="0" dy="1.5" result="b"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.32"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Cream rounded-square base. -->
  <rect x="12" y="12" width="104" height="104" rx="22" ry="22"
        fill="url(#bg)"/>

  <!--
    Masonry arch. Both arcs are concentric: same centre at (64, 64),
    outer radius 40, inner radius 30. Each arc sits on top of straight
    legs that descend to y=110 (the floor / 2px above the safe-zone bottom).
    Result: uniform 10px wall thickness around the entire archway —
    sides and apex alike — which reads as architecturally honest at
    every size.

    Path uses fill-rule="evenodd" so the inner sub-path subtracts cleanly.
  -->
  <g filter="url(#shadow)">
    <path fill="url(#stone)" fill-rule="evenodd"
          d="
            M 24 110
            L 24 64
            A 40 40 0 0 1 104 64
            L 104 110
            Z
            M 34 110
            L 34 64
            A 30 30 0 0 1 94 64
            L 94 110
            Z
          "/>

    <!--
      Keystone. A short trapezoidal wedge nested AT THE APEX, between
      the outer arc top (y=24) and the inner arc top (y=34). Wider at
      the top, narrower at the bottom — the wedge shape that physically
      locks a Roman arch together. Scaled and positioned so it reads as
      part of the masonry, not floating in the archway interior.
    -->
    <path d="M 58 24 L 70 24 L 67.5 34 L 60.5 34 Z"
          fill="#9A8870" stroke="#3E332A" stroke-width="0.6"/>
  </g>

  <!--
    RSS broadcast mark, centred horizontally in the inner arch (x=64).
    Vertically positioned in the lower portion of the archway opening
    so the dot anchors low and the arcs sweep up into the archway's
    head room.

    Sizing: large enough to read confidently at the 48px size where
    GNOME's app grid renders. Stroke width scales naturally with SVG.
  -->
  <g transform="translate(56 88)" stroke="url(#rss)" stroke-linecap="round"
     fill="none">
    <circle cx="0" cy="0" r="4.5" fill="url(#rss)" stroke="none"/>
    <path d="M 0 -10 A 10 10 0 0 1 10 0" stroke-width="5"/>
    <path d="M 0 -20 A 20 20 0 0 1 20 0" stroke-width="5"/>
  </g>
</svg>
