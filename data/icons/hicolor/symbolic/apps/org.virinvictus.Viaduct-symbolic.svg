<?xml version="1.0" encoding="UTF-8"?>
<!--
  Viaduct symbolic icon — single-colour redraw matching the v1.5.4
  icon redesign.

  Concentric arc geometry (uniform 1px wall on the 16×16 grid) so the
  silhouette stays symmetric at every render size. Recolours via
  `currentColor` for sidebars / menu items / notifications.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     width="16" height="16"
     viewBox="0 0 16 16"
     fill="#222222">
  <!--
    Arch silhouette. Concentric arcs centred at (8, 8): outer radius 6,
    inner radius 5. Both arcs sit on top of straight legs descending to
    y=14. Wall thickness 1px around the curve and on the sides.
  -->
  <path fill-rule="evenodd"
        d="
          M 2 14
          L 2 8
          A 6 6 0 0 1 14 8
          L 14 14
          Z
          M 3 14
          L 3 8
          A 5 5 0 0 1 13 8
          L 13 14
          Z
        "/>

  <!--
    RSS broadcast dot — single anchor at the bottom-left of the arch
    interior. Arcs are dropped at 16×16 because they collapse to noise
    at this scale; the dot alone reads as "feed reader" cleanly when
    paired with the arch silhouette.
  -->
  <circle cx="6.5" cy="11.5" r="0.9"/>
  <path d="M 6 10 a 1.7 1.7 0 0 1 1.7 1.7" stroke="#222222" stroke-width="0.7"
        fill="none" stroke-linecap="round"/>
</svg>
